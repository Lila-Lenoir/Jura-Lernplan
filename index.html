<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jura Lernplan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F8F7F4; font-family: Georgia, 'Times New Roman', serif; color: #1A1A1A; min-height: 100vh; }

    /* Header */
    #header {
      background: #1A1A1A; color: #F8F7F4;
      padding: 18px 20px 14px;
      position: sticky; top: 0; z-index: 50;
    }
    #header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; max-width: 720px; margin: 0 auto; }
    #header .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; margin-bottom: 2px; }
    #header .title { font-size: 17px; }
    #progress-wrap { text-align: right; }
    #progress-wrap .plabel { font-size: 11px; opacity: 0.5; margin-bottom: 5px; }
    #progress-bar-outer { display: flex; align-items: center; gap: 10px; }
    #progress-bar-bg { width: 110px; height: 4px; background: #333; border-radius: 2px; }
    #progress-bar-fill { height: 100%; background: #C8A96E; border-radius: 2px; transition: width 0.3s; }
    #progress-pct { font-size: 13px; color: #C8A96E; font-family: monospace; }

    /* Main */
    #main { padding: 18px 16px; max-width: 720px; margin: 0 auto; }

    /* Phase tabs */
    #phase-tabs { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
    .phase-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-family: Georgia, serif; cursor: pointer; white-space: nowrap;
      border: 1.5px solid #DDD; background: white; color: #666;
      transition: all 0.15s;
    }
    .phase-tab.active { font-weight: 600; }

    /* Phase info */
    #phase-info {
      background: white; border: 1px solid #E8E5DF; border-radius: 8px;
      padding: 13px 16px; margin-bottom: 14px;
      border-left-width: 3px; border-left-style: solid;
    }
    #phase-info-inner { display: flex; justify-content: space-between; align-items: flex-start; }
    #phase-info .pi-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    #phase-info .pi-sub { font-size: 12px; color: #888; }
    #phase-info .pi-tasks { font-size: 12px; color: #888; text-align: right; }

    /* Week cards */
    .week-card {
      background: white; border: 1px solid #E8E5DF; border-radius: 8px;
      padding: 13px 16px; margin-bottom: 10px; cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .week-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .week-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .week-num { font-size: 11px; color: #999; margin-bottom: 3px; letter-spacing: 0.05em; }
    .week-title { font-size: 14px; color: #1A1A1A; }
    .week-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
    .week-pct { font-size: 13px; font-family: monospace; font-weight: 600; }
    .week-hours { font-size: 11px; color: #999; }
    .week-bar-bg { height: 3px; background: #F0EDE8; border-radius: 2px; }
    .week-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .week-days { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .day-chip { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-family: monospace; border: 1px solid transparent; }

    /* Week detail */
    #back-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    #back-btn {
      background: none; border: 1px solid #DDD; border-radius: 20px;
      padding: 5px 12px; font-size: 12px; cursor: pointer; color: #666;
      font-family: Georgia, serif;
    }
    #week-detail-title { flex: 1; }
    #week-detail-title .wdt-num { font-size: 11px; color: #999; letter-spacing: 0.05em; }
    #week-detail-title .wdt-name { font-size: 15px; }
    #week-count { font-family: monospace; font-size: 13px; font-weight: 600; }

    .day-block { background: white; border: 1px solid #E8E5DF; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .day-header { padding: 10px 16px; border-bottom: 1px solid #E8E5DF; display: flex; justify-content: space-between; align-items: center; }
    .day-name { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; }
    .day-h { font-size: 11px; color: #999; }
    .task-row {
      padding: 13px 16px; cursor: pointer; display: flex; gap: 12px;
      align-items: flex-start; border-bottom: 1px solid #F0EDE8;
      transition: background 0.15s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row.done { background: #FAFDF7; }
    .task-checkbox {
      width: 18px; height: 18px; border-radius: 3px; border: 2px solid #DDD;
      background: white; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-size: 11px; color: white;
    }
    .task-checkbox.checked { border-color: var(--phase-color); background: var(--phase-color); }
    .task-what { font-size: 14px; color: #1A1A1A; margin-bottom: 4px; }
    .task-row.done .task-what { color: #888; text-decoration: line-through; }
    .task-how { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 5px; }
    .task-resource { font-size: 10px; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.03em; display: inline-block; }

    /* Nav buttons */
    #week-nav { display: flex; gap: 8px; margin-top: 16px; }
    .nav-btn {
      flex: 1; padding: 10px; border: 1px solid #DDD; border-radius: 6px;
      background: white; color: #555; cursor: pointer; font-family: Georgia, serif; font-size: 13px;
    }
    .nav-btn:disabled { color: #CCC; cursor: default; }

    @media (max-width: 480px) {
      #header { padding: 14px 14px 12px; }
      #main { padding: 14px 12px; }
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <div class="label">Jura Vorstudium</div>
      <div class="title">12-Monats Lernplan</div>
    </div>
    <div id="progress-wrap">
      <div class="plabel">Gesamtfortschritt</div>
      <div id="progress-bar-outer">
        <div id="progress-bar-bg"><div id="progress-bar-fill" style="width:0%"></div></div>
        <div id="progress-pct">0%</div>
      </div>
    </div>
  </div>
</div>

<div id="main">
  <div id="phase-tabs"></div>
  <div id="overview">
    <div id="phase-info"></div>
    <div id="week-list"></div>
  </div>
  <div id="week-detail" style="display:none">
    <div id="back-row">
      <button id="back-btn" onclick="showOverview()">← Zurück</button>
      <div id="week-detail-title">
        <div class="wdt-num" id="wdt-num"></div>
        <div class="wdt-name" id="wdt-name"></div>
      </div>
      <div id="week-count"></div>
    </div>
    <div id="day-list"></div>
    <div id="week-nav">
      <button class="nav-btn" id="prev-btn" onclick="navWeek(-1)">← Vorherige Woche</button>
      <button class="nav-btn" id="next-btn" onclick="navWeek(1)">Nächste Woche →</button>
    </div>
  </div>
</div>

<script>
const PHASES = [

        { day: "Di", hours: 2, tasks: [{ what: "Gutachtenstil Schema", how: "Obersatz → Definition → Subsumtion → Ergebnis aufschreiben und mit 3 eigenen Beispielsätzen üben", resource: "Eigene Notizen" }] },

        { day: "So", hours: 1, tasks: [{ what: "Review", how: "Was war diese Woche unklar? Eine Seite Zusammenfassung schreiben", resource: "Eigene Notizen" }] },

        { day: "So", hours: 1, tasks: [{ what: "Vorbereitung Woche 3", how: "Köhler BGB AT: Inhaltsverzeichnis lesen, Aufbau verstehen", resource: "Köhler BGB AT" }] },

      { week: 3, title: "BGB AT: Rechtssubjekte & -objekte", days: [

const STORAGE_KEY = "jura_progress_v3";
let progress = {};
try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch {}

let currentPhase = 0;
let currentWeekIdx = null;

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch {}
}

function taskKey(phaseId, weekNum, dayIdx, taskIdx) {
  return `p${phaseId}_w${weekNum}_d${dayIdx}_t${taskIdx}`;
}

function weekProgress(phase, week) {
  let done = 0, total = 0;
  week.days.forEach((d, di) => d.tasks.forEach((_, ti) => {
    total++;
    if (progress[taskKey(phase.id, week.week, di, ti)]) done++;
  }));
  return { done, total };
}

function totalProgress() {
  let done = 0, total = 0;
  PHASES.forEach(ph => ph.weeks.forEach(w => {
    const p = weekProgress(ph, w);
    done += p.done; total += p.total;
  }));
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function updateHeader() {
  const pct = totalProgress();
  document.getElementById("progress-bar-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
}

function renderPhaseTabs() {
  const container = document.getElementById("phase-tabs");
  container.innerHTML = "";
  PHASES.forEach((ph, i) => {
    const btn = document.createElement("button");
    btn.className = "phase-tab" + (i === currentPhase ? " active" : "");
    btn.textContent = ph.label + " · " + ph.title;
    btn.style.cssText = i === currentPhase
      ? `border-color:${ph.color};background:${ph.bg};color:${ph.color};`
      : "";
    btn.onclick = () => { currentPhase = i; renderOverview(); };
    container.appendChild(btn);
  });
}

function renderOverview() {
  renderPhaseTabs();
  const ph = PHASES[currentPhase];

  // Phase info
  let phDone = 0, phTotal = 0;
  ph.weeks.forEach(w => { const p = weekProgress(ph, w); phDone += p.done; phTotal += p.total; });
  document.getElementById("phase-info").style.borderLeftColor = ph.color;
  document.getElementById("phase-info").innerHTML = `
    <div id="phase-info-inner">
      <div>
        <div class="pi-label" style="color:${ph.color}">${ph.label} — ${ph.title}</div>
        <div class="pi-sub">${ph.subtitle} · ${ph.weeks.length} Wochen</div>
      </div>
      <div class="pi-tasks">${phDone} / ${phTotal} Tasks</div>
    </div>`;

  // Week list
  const list = document.getElementById("week-list");
  list.innerHTML = "";
  ph.weeks.forEach((week, wi) => {
    const { done, total } = weekProgress(ph, week);
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const totalHours = week.days.reduce((a, d) => a + d.hours, 0);

    const card = document.createElement("div");
    card.className = "week-card";
    card.style.borderColor = "#E8E5DF";

    const dayChips = week.days.map((d, di) => {
      const dayDone = d.tasks.every((_, ti) => progress[taskKey(ph.id, week.week, di, ti)]);
      return `<span class="day-chip" style="background:${dayDone ? ph.bg : "#F5F3EF"};color:${dayDone ? ph.color : "#999"};${dayDone ? `border-color:${ph.color}30` : ""}">${d.day} ${d.hours}h</span>`;
    }).join("");

    card.innerHTML = `
      <div class="week-card-top">
        <div>
          <div class="week-num">WOCHE ${week.week}</div>
          <div class="week-title">${week.title}</div>
        </div>
        <div class="week-right">
          <div class="week-pct" style="color:${pct===100?"#16A34A":ph.color}">${pct}%</div>
          <div class="week-hours">${totalHours}h</div>
        </div>
      </div>
      <div class="week-bar-bg"><div class="week-bar-fill" style="width:${pct}%;background:${pct===100?"#16A34A":ph.color}"></div></div>
      <div class="week-days">${dayChips}</div>`;

    card.onmouseenter = () => { card.style.boxShadow = "0 2px 8px rgba(0,0,0,0.08)"; card.style.borderColor = "#C8A96E"; };
    card.onmouseleave = () => { card.style.boxShadow = ""; card.style.borderColor = "#E8E5DF"; };
    card.onclick = () => openWeek(wi);
    list.appendChild(card);
  });

  document.getElementById("overview").style.display = "";
  document.getElementById("week-detail").style.display = "none";
}

function openWeek(wi) {
  currentWeekIdx = wi;
  renderWeekDetail();
  document.getElementById("overview").style.display = "none";
  document.getElementById("week-detail").style.display = "";
  window.scrollTo(0, 0);
}

function showOverview() {
  renderOverview();
}

function navWeek(dir) {
  const ph = PHASES[currentPhase];
  const next = currentWeekIdx + dir;
  if (next >= 0 && next < ph.weeks.length) {
    currentWeekIdx = next;
    renderWeekDetail();
    window.scrollTo(0, 0);
  }
}

function renderWeekDetail() {
  const ph = PHASES[currentPhase];
  const week = ph.weeks[currentWeekIdx];
  const { done, total } = weekProgress(ph, week);

  document.getElementById("wdt-num").textContent = `WOCHE ${week.week} · ${ph.label}`;
  document.getElementById("wdt-name").textContent = week.title;
  document.getElementById("week-count").style.color = done === total && total > 0 ? "#16A34A" : ph.color;
  document.getElementById("week-count").textContent = `${done}/${total}`;

  document.getElementById("prev-btn").disabled = currentWeekIdx === 0;
  document.getElementById("next-btn").disabled = currentWeekIdx === ph.weeks.length - 1;

  const dayList = document.getElementById("day-list");
  dayList.innerHTML = "";
  dayList.style.setProperty("--phase-color", ph.color);

  week.days.forEach((day, di) => {
    const allDone = day.tasks.every((_, ti) => progress[taskKey(ph.id, week.week, di, ti)]);
    const block = document.createElement("div");
    block.className = "day-block";

    const dayNames = { Mo: "Montag", Di: "Dienstag", Mi: "Mittwoch", Do: "Donnerstag", Fr: "Freitag", Sa: "Samstag", So: "Sonntag" };

    let tasksHtml = day.tasks.map((task, ti) => {
      const key = taskKey(ph.id, week.week, di, ti);
      const done = progress[key];
      return `
        <div class="task-row${done ? " done" : ""}" data-di="${di}" data-ti="${ti}" onclick="toggleTask(${ph.id},${week.week},${di},${ti},this)">
          <div class="task-checkbox${done ? " checked" : ""}" style="--phase-color:${ph.color}">${done ? "✓" : ""}</div>
          <div>
            <div class="task-what">${task.what}</div>
            <div class="task-how">${task.how}</div>
            <span class="task-resource" style="color:${ph.color};background:${ph.bg}">${task.resource}</span>
          </div>
        </div>`;
    }).join("");

    block.innerHTML = `
      <div class="day-header" style="background:${allDone ? ph.bg : "#FAFAF8"}">
        <span class="day-name" style="color:${allDone ? ph.color : "#555"}">${dayNames[day.day] || day.day} ${allDone ? "✓" : ""}</span>
        <span class="day-h">${day.hours}h</span>
      </div>
      ${tasksHtml}`;

    dayList.appendChild(block);
  });
}

function toggleTask(phaseId, weekNum, dayIdx, taskIdx, el) {
  const key = taskKey(phaseId, weekNum, dayIdx, taskIdx);
  progress[key] = !progress[key];
  saveProgress();
  updateHeader();

  const row = el.closest ? el : el;
  const isDone = progress[key];
  const ph = PHASES.find(p => p.id === phaseId);

  row.classList.toggle("done", isDone);
  const cb = row.querySelector(".task-checkbox");
  cb.classList.toggle("checked", isDone);
  cb.textContent = isDone ? "✓" : "";

  // Update week count
  const week = ph.weeks.find(w => w.week === weekNum);
  if (week) {
    const { done, total } = weekProgress(ph, week);
    document.getElementById("week-count").textContent = `${done}/${total}`;
    document.getElementById("week-count").style.color = done === total ? "#16A34A" : ph.color;
  }
}

// Init
updateHeader();
renderOverview();
